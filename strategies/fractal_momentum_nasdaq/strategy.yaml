name: "Fractal Momentum — US (Nasdaq 100)"
description: "US stocks breakout strategy using 5m timeframe"

strategy_type: fractal_momentum

exchange:
  suffix: ".US"
  timezone: "America/New_York"
  market_open: "09:30"
  market_close: "16:00"

engine:
  cycle_seconds: 300
  fetch_lookback_days: 2
  daily_lookback_days: 60
  compute_lookback_days: 30
  fetch_concurrency: 1
  compute_workers: 1
  order_qty: 1

parameters:
  fractal_left: 2
  fractal_right: 2
  cmo_period: 11
  cmo_ema_period: 5
  cmo_sma_period: 11
  capital_per_trade: 10000

backtest:
  daily_lookback: "2y"
  intraday_days: 60
  backtest_days: 30
