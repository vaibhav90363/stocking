services:
  - type: web
    name: stocking-web-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 run_strategy.py --all-strategies --mode live
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "true"
      # Render injects these automatically — listed here so they propagate
      # through subprocess.Popen env copies into child engine processes.
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: RENDER_SERVICE_NAME
        sync: false
